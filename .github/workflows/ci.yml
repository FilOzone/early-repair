name: CI
on:
  push:
    branches:
      - master
    paths:
      - "packages/**"
      - "apps/**"
      - .github/workflows/ci.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  pull_request:
    paths:
      - "packages/**"
      - "apps/**"
      - .github/workflows/ci.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js lts/*
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install Dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint
