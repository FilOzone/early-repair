specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: FilecoinWarmStorageService
    network: filecoin-testnet
    source:
      address: "0x02925630df557F957f70E112bA06e50965417CA0"
      abi: FilecoinWarmStorageService
      startBlock: 3141266
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DataSet
        - Piece
        - PieceReplica
      abis:
        - name: FilecoinWarmStorageService
          file: ./abi/FilecoinWarmStorageService.abi.json
      eventHandlers:
        - event: DataSetCreated(indexed uint256,indexed uint256,uint256,uint256,uint256,address,address,address,string[],string[])
          handler: handleDataSetCreated
        - event: PieceAdded(indexed uint256,indexed uint256,(bytes),string[],string[])
          handler: handlePieceAdded
        - event: PDPPaymentTerminated(indexed uint256,uint256,uint256)
          handler: handlePDPPaymentTerminated
        - event: ServiceTerminated(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleServiceTerminated
      file: ./src/filecoin-warm-storage-service.ts
  - kind: ethereum
    name: PDPVerifier
    network: filecoin-testnet
    source:
      address: "0x85e366Cf9DD2c0aE37E963d9556F5f4718d6417C"
      abi: PDPVerifier
      startBlock: 3141266
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DataSet
        - Piece
        - PieceReplica
      abis:
        - name: PDPVerifier
          file: ./abi/PDPVerifier.abi.json
      eventHandlers:
        - event: PiecesRemoved(indexed uint256,uint256[])
          handler: handlePiecesRemoved
        - event: DataSetDeleted(indexed uint256,uint256)
          handler: handleDataSetDeleted
      file: ./src/pdp-verifier.ts
