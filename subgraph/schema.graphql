type DataSet @entity(immutable: false) {
  id: ID!
  dataSetId: BigInt!
  providerId: BigInt!
  payer: Bytes!
  payee: Bytes!
  serviceProvider: Bytes!
  pdpRailId: BigInt!
  cacheMissRailId: BigInt!
  cdnRailId: BigInt!
  metadataKeys: [String!]!
  metadataValues: [String!]!
  source: String!
  withCDN: Boolean!
  withIPFSIndexing: Boolean!
  initialized: Boolean!
  isActive: Boolean!
  isDeleted: Boolean!
  pdpPaymentTerminated: Boolean!
  pdpEndEpoch: BigInt!
  totalPieces: BigInt!
  activePieces: BigInt!
  isEmpty: Boolean!
  createdAt: BigInt!
  updatedAt: BigInt!
  createdAtBlock: BigInt!
  updatedAtBlock: BigInt!
  pieces: [PieceReplica!]! @derivedFrom(field: "dataSet")
}

type Piece @entity(immutable: false) {
  id: ID!
  cid: Bytes!
  rawSize: BigInt!
  replicaCount: BigInt!
  activeReplicaCount: BigInt!
  firstSeenAt: BigInt!
  lastSeenAt: BigInt!
  firstSeenAtBlock: BigInt!
  lastSeenAtBlock: BigInt!
  replicas: [PieceReplica!]! @derivedFrom(field: "piece")
}

type PieceReplica @entity(immutable: false) {
  id: ID!
  piece: Piece!
  dataSet: DataSet!
  dataSetId: BigInt!
  providerId: BigInt!
  pieceId: BigInt!
  cid: Bytes!
  rawSize: BigInt!
  metadataKeys: [String!]!
  metadataValues: [String!]!
  addedAt: BigInt!
  addedAtBlock: BigInt!
  transactionHash: Bytes!
  logIndex: BigInt!
  removed: Boolean!
  removedAt: BigInt
  removedAtBlock: BigInt
  removedTransactionHash: Bytes
}
